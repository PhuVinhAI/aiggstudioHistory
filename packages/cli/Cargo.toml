[package]
name = "ai-studio-archiver-cli"
version = "0.1.0"
edition = "2021"
authors = ["AI Studio Archiver Team"]
description = "CLI tool to export Google AI Studio chat history"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
tokio = { version = "1.40", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
